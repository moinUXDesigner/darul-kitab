name: Deploy to Hostinger

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout repo
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2. Setup Node.js
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      # 3. Install dependencies
      - name: Install dependencies
        working-directory: darulkitab-frontend
        run: npm ci

      # 4. Build frontend
      - name: Build frontend
        working-directory: darulkitab-frontend
        run: npm run build

      # 5. Create backend env file from GitHub Secrets
      - name: Create backend .env
        env:
          APP_BASE_URL: ${{ secrets.APP_BASE_URL }}
          APP_NAME: ${{ secrets.APP_NAME }}
          MAIL_FROM_ADDRESS: ${{ secrets.MAIL_FROM_ADDRESS }}
          MAIL_FROM_NAME: ${{ secrets.MAIL_FROM_NAME }}
          MAIL_REPLY_TO: ${{ secrets.MAIL_REPLY_TO }}
          PASSWORD_RESET_TTL_MINUTES: ${{ secrets.PASSWORD_RESET_TTL_MINUTES }}
          RAZORPAY_KEY_ID: ${{ secrets.RAZORPAY_KEY_ID }}
          RAZORPAY_KEY_SECRET: ${{ secrets.RAZORPAY_KEY_SECRET }}
          RAZORPAY_WEBHOOK_SECRET: ${{ secrets.RAZORPAY_WEBHOOK_SECRET }}
          SMTP_ENCRYPTION: ${{ secrets.SMTP_ENCRYPTION }}
          SMTP_HOST: ${{ secrets.SMTP_HOST }}
          SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          SMTP_TIMEOUT: ${{ secrets.SMTP_TIMEOUT }}
          SMTP_USERNAME: ${{ secrets.SMTP_USERNAME }}
        run: |
          APP_NAME="${APP_NAME:-Quran Fahmi}"
          APP_BASE_URL="${APP_BASE_URL:-https://quranfahmi.in}"
          SMTP_HOST="${SMTP_HOST:-smtp.hostinger.com}"
          SMTP_PORT="${SMTP_PORT:-465}"
          SMTP_ENCRYPTION="${SMTP_ENCRYPTION:-ssl}"
          SMTP_TIMEOUT="${SMTP_TIMEOUT:-15}"
          PASSWORD_RESET_TTL_MINUTES="${PASSWORD_RESET_TTL_MINUTES:-60}"
          MAIL_FROM_ADDRESS="${MAIL_FROM_ADDRESS:-$SMTP_USERNAME}"
          MAIL_FROM_NAME="${MAIL_FROM_NAME:-$APP_NAME}"
          MAIL_REPLY_TO="${MAIL_REPLY_TO:-$MAIL_FROM_ADDRESS}"

          required_vars=(
            RAZORPAY_KEY_ID
            RAZORPAY_KEY_SECRET
            RAZORPAY_WEBHOOK_SECRET
            SMTP_PASSWORD
            SMTP_USERNAME
          )

          missing_vars=()
          for var_name in "${required_vars[@]}"; do
            if [ -z "${!var_name}" ]; then
              missing_vars+=("$var_name")
            fi
          done

          if [ "${#missing_vars[@]}" -gt 0 ]; then
            echo "Missing required GitHub Secrets: ${missing_vars[*]}"
            exit 1
          fi

          cat > darulkitab-backend/api/.env <<EOF
          APP_NAME=$APP_NAME
          APP_BASE_URL=$APP_BASE_URL
          MAIL_FROM_ADDRESS=$MAIL_FROM_ADDRESS
          MAIL_FROM_NAME=$MAIL_FROM_NAME
          MAIL_REPLY_TO=$MAIL_REPLY_TO
          SMTP_HOST=$SMTP_HOST
          SMTP_PORT=$SMTP_PORT
          SMTP_ENCRYPTION=$SMTP_ENCRYPTION
          SMTP_USERNAME=$SMTP_USERNAME
          SMTP_PASSWORD=$SMTP_PASSWORD
          SMTP_TIMEOUT=$SMTP_TIMEOUT
          PASSWORD_RESET_TTL_MINUTES=$PASSWORD_RESET_TTL_MINUTES
          RAZORPAY_KEY_ID=$RAZORPAY_KEY_ID
          RAZORPAY_KEY_SECRET=$RAZORPAY_KEY_SECRET
          RAZORPAY_WEBHOOK_SECRET=$RAZORPAY_WEBHOOK_SECRET
          EOF

      - name: Install rsync and OpenSSH client
        run: sudo apt-get update && sudo apt-get install -y rsync openssh-client

      - name: Prepare SSH authentication
        env:
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_PORT: ${{ secrets.SSH_PORT }}
          SSH_USERNAME: ${{ secrets.SSH_USERNAME }}
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
          SSH_PASSPHRASE: ${{ secrets.SSH_PASSPHRASE }}
          SSH_KNOWN_HOSTS: ${{ secrets.SSH_KNOWN_HOSTS }}
        run: |
          required_ssh_vars=(
            SSH_HOST
            SSH_USERNAME
            SSH_PRIVATE_KEY
            SSH_PASSPHRASE
            SSH_KNOWN_HOSTS
          )

          missing_ssh_vars=()
          for var_name in "${required_ssh_vars[@]}"; do
            if [ -z "${!var_name}" ]; then
              missing_ssh_vars+=("$var_name")
            fi
          done

          if [ "${#missing_ssh_vars[@]}" -gt 0 ]; then
            echo "Missing required SSH GitHub Secrets: ${missing_ssh_vars[*]}"
            exit 1
          fi

          SSH_PORT="${SSH_PORT:-65002}"

          install -m 700 -d ~/.ssh
          printf '%s\n' "$SSH_PRIVATE_KEY" > ~/.ssh/deploy_key
          printf '%s\n' "$SSH_KNOWN_HOSTS" > ~/.ssh/known_hosts
          chmod 600 ~/.ssh/deploy_key ~/.ssh/known_hosts

          cat > ~/.ssh/ssh_askpass.sh <<'EOF'
          #!/bin/sh
          printf '%s\n' "$SSH_PASSPHRASE"
          EOF
          chmod 700 ~/.ssh/ssh_askpass.sh

          eval "$(ssh-agent -s)"
          export SSH_ASKPASS=~/.ssh/ssh_askpass.sh
          export SSH_ASKPASS_REQUIRE=force
          export DISPLAY=:0
          setsid ssh-add ~/.ssh/deploy_key < /dev/null

          {
            echo "SSH_PORT=$SSH_PORT"
            echo "SSH_AUTH_SOCK=$SSH_AUTH_SOCK"
            echo "SSH_AGENT_PID=$SSH_AGENT_PID"
          } >> "$GITHUB_ENV"

      - name: Deploy via SSH and rsync
        env:
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_PORT: ${{ secrets.SSH_PORT }}
          SSH_USERNAME: ${{ secrets.SSH_USERNAME }}
          SSH_REMOTE_DIR: ${{ secrets.SSH_REMOTE_DIR }}
        run: |
          SSH_PORT="${SSH_PORT:-65002}"
          REMOTE_DIR="${SSH_REMOTE_DIR:-.}"
          SSH_TARGET="$SSH_USERNAME@$SSH_HOST"
          RSYNC_SSH="ssh -p $SSH_PORT -o BatchMode=yes -o StrictHostKeyChecking=yes"

          $RSYNC_SSH "$SSH_TARGET" "
            if [ ! -d \"$REMOTE_DIR/api\" ]; then
              mkdir -p \"$REMOTE_DIR/api\"
            fi
          "

          rsync -az --delete --itemize-changes \
            --exclude='api/' \
            --exclude='storage/' \
            -e "$RSYNC_SSH" \
            darulkitab-frontend/dist/ "$SSH_TARGET:$REMOTE_DIR/"

          rsync -az --delete --itemize-changes \
            --exclude='storage/' \
            -e "$RSYNC_SSH" \
            darulkitab-backend/api/ "$SSH_TARGET:$REMOTE_DIR/api/"
