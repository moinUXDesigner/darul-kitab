name: Deploy to Hostinger

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install dependencies
        working-directory: darulkitab-frontend
        run: npm ci

      - name: Build frontend
        working-directory: darulkitab-frontend
        run: npm run build

      - name: Install lftp
        run: sudo apt-get update && sudo apt-get install -y lftp

      - name: Deploy frontend + backend via lftp
        env:
          FTP_SERVER: ${{ secrets.FTP_SERVER }}
          FTP_USERNAME: ${{ secrets.FTP_USERNAME }}
          FTP_PASSWORD: ${{ secrets.FTP_PASSWORD }}
        run: |
          lftp -u "$FTP_USERNAME","$FTP_PASSWORD" "$FTP_SERVER" <<'EOF'
          set cmd:fail-exit true
          set ftp:ssl-allow true
          set ftp:ssl-force true
          set ssl:verify-certificate no
          set ftp:passive-mode true
          set net:timeout 20
          set net:max-retries 5
          set net:reconnect-interval-base 5
          set net:reconnect-interval-max 30

          mkdir -p /public_html
          mkdir -p /public_html/api

          mirror -R --delete --verbose --parallel=2 darulkitab-frontend/dist/ /public_html/
          mirror -R --delete --verbose --parallel=2 darulkitab-backend/api/ /public_html/api/
          bye
          EOF
