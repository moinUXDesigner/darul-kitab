name: Deploy to Hostinger

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout repo
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2. Debug structure (IMPORTANT for troubleshooting)
      - name: Show folder structure
        run: ls -R

      # 3. Setup Node.js (updated version)
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      # 4. Install frontend dependencies
      - name: Install frontend dependencies
        run: |
          cd darulkitab-frontend
          npm install

      # 5. Build frontend (Vite)
      - name: Build frontend
        run: |
          cd darulkitab-frontend
          npm run build

      # 6. Deploy frontend (dist → public_html)
      - name: Deploy frontend via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.4
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          local-dir: darulkitab-frontend/dist/
          server-dir: public_html/
          dangerous-clean-slate: false
          exclude: |
            **/.git*
            **/.git*/**
            node_modules/**

      # 7. Deploy backend (→ public_html/api)
      - name: Deploy backend via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.4
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          local-dir: darulkitab-backend/
          server-dir: public_html/api/
          dangerous-clean-slate: false
          exclude: |
            **/.git*
            **/.git*/**
            node_modules/**
