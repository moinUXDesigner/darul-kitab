name: Deploy to Hostinger

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout repo
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2. Setup Node.js
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      # 3. Install dependencies
      - name: Install dependencies
        working-directory: darulkitab-frontend
        run: npm ci

      # 4. Build frontend
      - name: Build frontend
        working-directory: darulkitab-frontend
        run: npm run build

      # 5. Create backend env file from GitHub Secrets
      - name: Create backend .env
        env:
          APP_BASE_URL: ${{ secrets.APP_BASE_URL }}
          APP_NAME: ${{ secrets.APP_NAME }}
          MAIL_FROM_ADDRESS: ${{ secrets.MAIL_FROM_ADDRESS }}
          MAIL_FROM_NAME: ${{ secrets.MAIL_FROM_NAME }}
          MAIL_REPLY_TO: ${{ secrets.MAIL_REPLY_TO }}
          PASSWORD_RESET_TTL_MINUTES: ${{ secrets.PASSWORD_RESET_TTL_MINUTES }}
          RAZORPAY_KEY_ID: ${{ secrets.RAZORPAY_KEY_ID }}
          RAZORPAY_KEY_SECRET: ${{ secrets.RAZORPAY_KEY_SECRET }}
          RAZORPAY_WEBHOOK_SECRET: ${{ secrets.RAZORPAY_WEBHOOK_SECRET }}
          SMTP_ENCRYPTION: ${{ secrets.SMTP_ENCRYPTION }}
          SMTP_HOST: ${{ secrets.SMTP_HOST }}
          SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          SMTP_TIMEOUT: ${{ secrets.SMTP_TIMEOUT }}
          SMTP_USERNAME: ${{ secrets.SMTP_USERNAME }}
        run: |
          APP_NAME="${APP_NAME:-Quran Fahmi}"
          APP_BASE_URL="${APP_BASE_URL:-https://quranfahmi.in}"
          SMTP_HOST="${SMTP_HOST:-smtp.hostinger.com}"
          SMTP_PORT="${SMTP_PORT:-465}"
          SMTP_ENCRYPTION="${SMTP_ENCRYPTION:-ssl}"
          SMTP_TIMEOUT="${SMTP_TIMEOUT:-15}"
          PASSWORD_RESET_TTL_MINUTES="${PASSWORD_RESET_TTL_MINUTES:-60}"
          MAIL_FROM_ADDRESS="${MAIL_FROM_ADDRESS:-$SMTP_USERNAME}"
          MAIL_FROM_NAME="${MAIL_FROM_NAME:-$APP_NAME}"
          MAIL_REPLY_TO="${MAIL_REPLY_TO:-$MAIL_FROM_ADDRESS}"

          required_vars=(
            RAZORPAY_KEY_ID
            RAZORPAY_KEY_SECRET
            RAZORPAY_WEBHOOK_SECRET
            SMTP_PASSWORD
            SMTP_USERNAME
          )

          missing_vars=()
          for var_name in "${required_vars[@]}"; do
            if [ -z "${!var_name}" ]; then
              missing_vars+=("$var_name")
            fi
          done

          if [ "${#missing_vars[@]}" -gt 0 ]; then
            echo "Missing required GitHub Secrets: ${missing_vars[*]}"
            exit 1
          fi

          cat > darulkitab-backend/api/.env <<EOF
          APP_NAME=$APP_NAME
          APP_BASE_URL=$APP_BASE_URL
          MAIL_FROM_ADDRESS=$MAIL_FROM_ADDRESS
          MAIL_FROM_NAME=$MAIL_FROM_NAME
          MAIL_REPLY_TO=$MAIL_REPLY_TO
          SMTP_HOST=$SMTP_HOST
          SMTP_PORT=$SMTP_PORT
          SMTP_ENCRYPTION=$SMTP_ENCRYPTION
          SMTP_USERNAME=$SMTP_USERNAME
          SMTP_PASSWORD=$SMTP_PASSWORD
          SMTP_TIMEOUT=$SMTP_TIMEOUT
          PASSWORD_RESET_TTL_MINUTES=$PASSWORD_RESET_TTL_MINUTES
          RAZORPAY_KEY_ID=$RAZORPAY_KEY_ID
          RAZORPAY_KEY_SECRET=$RAZORPAY_KEY_SECRET
          RAZORPAY_WEBHOOK_SECRET=$RAZORPAY_WEBHOOK_SECRET
          EOF

      # 5. Install lftp
      - name: Install lftp
        run: sudo apt-get update && sudo apt-get install -y lftp

      # 6. Deploy via FTP (Hostinger FIXED)
      - name: Deploy via lftp
        env:
          FTP_PORT: ${{ secrets.FTP_PORT }}
          FTP_REMOTE_DIR: ${{ secrets.FTP_REMOTE_DIR }}
          FTP_SERVER: ${{ secrets.FTP_SERVER }}
          FTP_USERNAME: ${{ secrets.FTP_USERNAME }}
          FTP_PASSWORD: ${{ secrets.FTP_PASSWORD }}
        run: |
          required_ftp_vars=(
            FTP_SERVER
            FTP_USERNAME
            FTP_PASSWORD
          )

          missing_ftp_vars=()
          for var_name in "${required_ftp_vars[@]}"; do
            if [ -z "${!var_name}" ]; then
              missing_ftp_vars+=("$var_name")
            fi
          done

          if [ "${#missing_ftp_vars[@]}" -gt 0 ]; then
            echo "Missing required FTP GitHub Secrets: ${missing_ftp_vars[*]}"
            exit 1
          fi

          FTP_PORT="${FTP_PORT:-21}"
          REMOTE_DIR="${FTP_REMOTE_DIR:-.}"

          lftp -u "$FTP_USERNAME","$FTP_PASSWORD" -p "$FTP_PORT" "$FTP_SERVER" -e "
            set ftp:passive-mode yes;
            set ftp:ssl-force true;
            set ftp:ssl-protect-data true;
            set net:timeout 60;
            set net:max-retries 5;
            set net:reconnect-interval-base 5;
            set net:reconnect-interval-multiplier 1.5;
            set ssl:verify-certificate yes;

            cd $REMOTE_DIR;

            # Upload frontend (to public_html root, preserve api/ and storage/)
            mirror -R --delete --verbose --no-perms \
            --exclude api/ \
            --exclude storage/ \
            darulkitab-frontend/dist/ ./

            # Upload backend (to public_html/api)
            mirror -R --delete --verbose --no-perms darulkitab-backend/api/ ./api/

            bye;
          "
