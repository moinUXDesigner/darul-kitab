name: Deploy to Hostinger

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout repo
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2. Setup Node.js
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      # 3. Install dependencies
      - name: Install dependencies
        working-directory: darulkitab-frontend
        run: npm ci

      # 4. Build frontend
      - name: Build frontend
        working-directory: darulkitab-frontend
        run: npm run build

      # 5. Create backend env file from GitHub Secrets
      - name: Create backend .env
        env:
          RAZORPAY_KEY_ID: ${{ secrets.RAZORPAY_KEY_ID }}
          RAZORPAY_KEY_SECRET: ${{ secrets.RAZORPAY_KEY_SECRET }}
          RAZORPAY_WEBHOOK_SECRET: ${{ secrets.RAZORPAY_WEBHOOK_SECRET }}
        run: |
          if [ -z "$RAZORPAY_KEY_ID" ] || [ -z "$RAZORPAY_KEY_SECRET" ] || [ -z "$RAZORPAY_WEBHOOK_SECRET" ]; then
            echo "Missing one or more Razorpay GitHub Secrets."
            exit 1
          fi

          cat > darulkitab-backend/api/.env <<EOF
          RAZORPAY_KEY_ID=$RAZORPAY_KEY_ID
          RAZORPAY_KEY_SECRET=$RAZORPAY_KEY_SECRET
          RAZORPAY_WEBHOOK_SECRET=$RAZORPAY_WEBHOOK_SECRET
          EOF

      # 5. Install lftp
      - name: Install lftp
        run: sudo apt-get update && sudo apt-get install -y lftp

      # 6. Deploy via FTP (Hostinger FIXED)
      - name: Deploy via lftp
        env:
          FTP_SERVER: ${{ secrets.FTP_SERVER }}
          FTP_USERNAME: ${{ secrets.FTP_USERNAME }}
          FTP_PASSWORD: ${{ secrets.FTP_PASSWORD }}
        run: |
          lftp -u "$FTP_USERNAME","$FTP_PASSWORD" "$FTP_SERVER" -e "
            set ftp:passive-mode yes;
            set net:timeout 60;
            set net:max-retries 5;
            set net:reconnect-interval-base 5;
            set net:reconnect-interval-multiplier 1.5;
            set ssl:verify-certificate no;

            # Upload frontend (to public_html root, preserve api/ and storage/)
            mirror -R --delete --verbose --no-perms \
            --exclude api/ \
            --exclude storage/ \
            darulkitab-frontend/dist/ ./

            # Upload backend (to public_html/api)
            mirror -R --delete --verbose --no-perms darulkitab-backend/api/ ./api/

            bye;
          "
