version: "3.9"

services:
  app:
    build:
      context: ./docker/php
    container_name: php-api
    ports:
      - "8080:80"
    environment:
      DOCKER_ENV: "true"
    volumes:
      - ./api:/var/www/html   # ✅ Application code
      - ./storage:/var/www/html/storage  # Quran audio files
    depends_on:
      - db


  db:
    image: mariadb:10.11
    container_name: mariadb_darulkitab
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: darulkitab_db
      MYSQL_USER: app_user
      MYSQL_PASSWORD: app_pass
    volumes:
      - dbdata:/var/lib/mysql
      - ./storage/u484303972_darulkitab_db_04-04-2026.sql:/docker-entrypoint-initdb.d/prod-dump.sql
      - ./docker/db/init.sh:/docker-entrypoint-initdb.d/zzz-init.sh
    ports:
      - "3306:3306"

  phpmyadmin:
    image: phpmyadmin/phpmyadmin
    container_name: pma
    ports:
      - "8081:80"
    environment:
      PMA_HOST: db
      PMA_USER: root
      PMA_PASSWORD: root

volumes:
  dbdata:
